name: Build ZX APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Generate ZX Icon
        run: |
          python3 -m pip install pillow
          python3 - <<'PY'
          import os
          from PIL import Image, ImageDraw, ImageFont, ImageFilter

          size = 1024
          img = Image.new("RGBA", (size, size), "#050508")
          draw = ImageDraw.Draw(img)

          # Carbon pattern
          for x in range(-size, size, 32):
              draw.line((x, 0, x + size, size), fill=(35, 35, 40, 90), width=12)
              draw.line((x + 16, 0, x + size + 16, size), fill=(10, 10, 14, 120), width=12)

          # Rounded neon frame
          margin = 55
          draw.rounded_rectangle(
              (margin, margin, size - margin, size - margin),
              radius=150,
              outline=(0, 255, 120, 255),
              width=18
          )

          glow = Image.new("RGBA", (size, size), (0, 0, 0, 0))
          glow_draw = ImageDraw.Draw(glow)
          glow_draw.rounded_rectangle(
              (margin, margin, size - margin, size - margin),
              radius=150,
              outline=(0, 255, 120, 180),
              width=26
          )
          glow = glow.filter(ImageFilter.GaussianBlur(14))
          img = Image.alpha_composite(img, glow)
          draw = ImageDraw.Draw(img)

          text = "ZX_"

          font_paths = [
              "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
              "/usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf"
          ]

          font_path = font_paths[0]
          for p in font_paths:
              if os.path.exists(p):
                  font_path = p
                  break

          font = ImageFont.truetype(font_path, 285)

          bbox = draw.textbbox((0, 0), text, font=font)
          tw = bbox[2] - bbox[0]
          th = bbox[3] - bbox[1]
          tx = (size - tw) // 2
          ty = (size - th) // 2 - 15

          # Text glow
          for blur in [18, 10, 5]:
              layer = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              layer_draw = ImageDraw.Draw(layer)
              layer_draw.text((tx, ty), text, font=font, fill=(0, 255, 120, 180))
              layer = layer.filter(ImageFilter.GaussianBlur(blur))
              img = Image.alpha_composite(img, layer)

          draw = ImageDraw.Draw(img)
          draw.text((tx, ty), text, font=font, fill=(110, 255, 0, 255))

          out_dir = "app/src/main/res/drawable"
          os.makedirs(out_dir, exist_ok=True)
          img.save(f"{out_dir}/zx_icon.png")
          PY

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZX-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
